name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: corepack enable

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - run: vp install --frozen-lockfile

      - run: vp check

      - run: pnpm --dir apps/viewer build

      - run: pnpm --dir apps/docs build

      - run: pnpm --dir apps/slides build

      - name: Create GitHub Release
        run: vp exec changelogen gh release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish @flaier/core
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @flaier/nuxt
        working-directory: packages/nuxt
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
