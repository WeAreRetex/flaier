name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: corepack enable

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - run: vp install --frozen-lockfile

      - run: vp check

      - run: pnpm --dir packages/core build

      - name: Create or update GitHub Release
        run: |
          NOTES_FILE="$(mktemp)"
          git tag -l --format='%(contents)' "${{ github.ref_name }}" > "$NOTES_FILE"
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file "$NOTES_FILE"
          else
            gh release create "${{ github.ref_name }}" --verify-tag --title "${{ github.ref_name }}" --notes-file "$NOTES_FILE"
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish @flaier/core
        working-directory: packages/core
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @flaier/nuxt
        working-directory: packages/nuxt
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
