name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - run: vp install --frozen-lockfile

      - run: vp check

      - run: pnpm --dir apps/viewer build

      - run: pnpm --dir apps/docs build

      - run: pnpm --dir apps/slides build
